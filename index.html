function ipdec(s) {
  const [w,f] = String(s).split(".");
  return parseInt(w) + (f ? parseInt(f)/3 : 0);
}

function fmt(n, dec=3) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return n.toFixed(dec);
}
